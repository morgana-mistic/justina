<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensajes para Justina</title>

<style>

body{

margin:0;

font-family:'Georgia',serif;

background:
linear-gradient(
135deg,
#fff1f6,
#fffaf0,
#fce8f1
);

min-height:100vh;

}



header{

text-align:center;

padding:45px 20px 20px;

color:#c9859b;

}



header h1{

margin:0;

font-size:38px;

font-weight:normal;

}



header p{

color:#9b7a82;

font-size:17px;

}



.container{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:25px;

padding:25px;

max-width:1000px;

margin:auto;

}



.card{

background:white;

border-radius:22px;

padding:25px;

box-shadow:

0 10px 25px rgba(180,120,140,.18);

position:relative;

overflow:hidden;

}



.card::before{

content:"";

position:absolute;

top:0;

left:0;

width:100%;

height:8px;

background:#f3b7c9;

}



.name{

font-size:20px;

font-weight:bold;

color:#c77c96;

margin-bottom:15px;

}



.message{

font-size:17px;

line-height:1.6;

color:#555;

white-space:pre-wrap;

}



.date{

margin-top:15px;

font-size:11px;

color:#aaa;

}



.btn{

position:fixed;

top:15px;

left:15px;

background:white;

padding:10px 16px;

border-radius:20px;

text-decoration:none;

color:#c77c96;

box-shadow:

0 5px 15px rgba(0,0,0,.12);

font-family:Arial,sans-serif;

font-size:14px;

}



.flor{

position:fixed;

font-size:35px;

opacity:.25;

}



.f1{

top:20%;

left:5%;

}



.f2{

bottom:15%;

right:8%;

}


</style>

</head>


<body>


<div class="flor f1">🌸</div>

<div class="flor f2">🌸</div>



<a class="btn" href="index.html">
🏠 Inicio
</a>



<header>

<h1>💗 Mensajes para Justina</h1>

<p>
Recuerdos, deseos y palabras llenas de amor
</p>

</header>



<div class="container" id="messages"></div>




<script>


const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTXxtPF46gap3gKJICdKZ6qJWkXIGzx1wpjOE2tCPM3dHWUZuj_BBhd9d2rvd25jgeLbPst927jAsvD/pub?output=csv";



const container=document.getElementById("messages");




function parseCSV(text){

let rows=[],
row=[],
cur="",
q=false;


for(let i=0;i<text.length;i++){

let c=text[i],
n=text[i+1];


if(c=='"'){

if(q && n=='"'){

cur+='"';

i++;

}

else{

q=!q;

}

}


else if(c=="," && !q){

row.push(cur);

cur="";

}


else if((c=="\n"||c=="\r")&&!q){

if(c=="\r" && n=="\n") i++;

row.push(cur);

rows.push(row);

row=[];

cur="";

}


else{

cur+=c;

}

}


if(cur || row.length){

row.push(cur);

rows.push(row);

}


return rows;

}





function esc(t){

return String(t)

.replace(/&/g,"&amp;")

.replace(/</g,"&lt;")

.replace(/>/g,"&gt;");

}


function load(){


fetch(SHEET_URL+"&t="+Date.now())


.then(r=>r.text())


.then(t=>{


let data=parseCSV(t);


let h=data[0].map(x=>x.toLowerCase());



let nI=h.findIndex(x=>x.includes("mi nombre"));

let mI=h.findIndex(x=>x.includes("mensaje"));

let dI=h.findIndex(x=>x.includes("submitted"));



container.innerHTML="";



data.slice(1).reverse().forEach(r=>{


let name=r[nI] || "Invitado";

let msg=r[mI] || "";

let date=r[dI] || "";



if(!msg)return;



let div=document.createElement("div");


div.className="card";



div.innerHTML=

"<div class='name'>💗 "+esc(name)+"</div>"+

"<div class='message'>"+esc(msg)+"</div>"+

"<div class='date'>"+esc(date)+"</div>";



container.appendChild(div);



});



});


}





load();


setInterval(load,20000);



</script>


</body>

</html>
