<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Josefina</title>


<style>


@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap');



html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

}



#contenedor{

position:relative;

width:100vw;

height:100vh;

overflow:hidden;

}



#portada{

position:absolute;

left:0;
top:0;

width:100%;
height:100%;

object-fit:contain;

user-select:none;

}



/* zonas clickeables */

#galeria{

position:absolute;

cursor:pointer;

z-index:20;

}



#musica{

position:absolute;

cursor:pointer;

z-index:20;

}



/* botón detener música */

#detener{

display:none;

position:absolute;

top:20px;

right:20px;

padding:12px 20px;

border:none;

border-radius:10px;

background:#d46d8d;

color:white;

font-size:18px;

cursor:pointer;

z-index:300;

}



/* FIRMA */

#firma{

position:fixed;

left:50%;

bottom:18px;

transform:translateX(-50%);

z-index:200;

font-family:Arial, Helvetica, sans-serif;

font-size:16px;

font-weight:bold;

white-space:nowrap;

}



#firma a{

color:white;

text-decoration:none;

text-shadow:

0 0 3px black,

0 0 6px black,

0 0 10px black;

transition:.25s;

}



#firma a:hover{

color:#ffd6e6;

}





/* =========================
   GALERIA INTEGRADA
========================= */


#visorGaleria{

display:none;

position:fixed;

z-index:500;

top:0;

left:0;

width:100%;

height:100%;

overflow:auto;

box-sizing:border-box;

padding:25px;


background:#fff6ef;

background-image:

radial-gradient(#efd8d0 1px, transparent 1px);

background-size:20px 20px;


font-family:'Poppins', sans-serif;

color:#8b6262;

}

#visorGaleria h1{

font-family:'Great Vibes', cursive;

font-size:60px;

font-weight:normal;

color:#ce8fa2;

text-align:center;

margin:10px 0 35px;

}

.galeriaFotos{


display:grid;

grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

gap:40px;

max-width:1000px;

margin:auto;

}

.foto{

position:relative;

background:white;

padding:12px 12px 25px;

box-shadow:

0 8px 18px rgba(120,80,80,.20);

cursor:pointer;

transition:.4s;

}

.foto:nth-child(odd){

transform:rotate(-3deg);

}



.foto:nth-child(even){

transform:rotate(3deg);

}

.foto:hover{

transform:rotate(0deg) translateY(-8px);

}


.foto img{


width:100%;

height:270px;

object-fit:cover;

border-radius:4px;


}


.texto{

text-align:center;

margin-top:15px;

font-size:16px;

font-style:italic;

color:#9e6878;

}


/* cinta adhesiva */

.foto::before{

content:"";

position:absolute;

width:70px;

height:22px;

background:rgba(240,210,180,.65);


top:-10px;

left:50%;

transform:translateX(-50%) rotate(-5deg);

}

/* botón volver */


.volverGaleria{

display:block;

width:max-content;

margin:45px auto 20px;

padding:12px 35px;

background:#dca7b6;

color:white;
border-radius:30px;
cursor:pointer;

}

/* visor de foto ampliada */

#visorFotoGrande{
display:none;
position:fixed;
z-index:1000;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(80,50,50,.75);

justify-content:center;

align-items:center;


}


#visorFotoGrande img{

max-width:90%;

max-height:85%;

object-fit:contain;

background:white;

padding:15px;

box-shadow:0 10px 40px black;


}


#visorFotoGrande.activo{

display:flex;

}

</style>

</head>
<body>

<div id="contenedor">

<img id="portada" src="portada.png">

<!-- zona invisible del botón galería -->

<div id="galeria"></div>

<!-- zona invisible del botón música -->

<div id="musica"></div>

<button id="detener">

Detener música

</button>

<!-- =========================
     GALERIA INTEGRADA
========================= -->

<div id="visorGaleria">


<h1>Mi mundo chiquito</h1>

<div class="galeriaFotos">

<div class="foto">

<img src="foto1.jpg">

<div class="texto">
Mi mamita
</div>

</div>

<div class="foto">

<img src="foto2.jpg">

<div class="texto">
Mami, papi y yo
</div>

</div>

<div class="foto">

<img src="foto3.jpg">

<div class="texto">
Tengo muchos tios
</div>

</div>


<div class="foto">

<img src="foto4.jpg">

<div class="texto">
... y tengo muchas tias
</div>

</div>

<div class="foto">

<img src="foto5.jpg">

<div class="texto">
Esperándome con amor todos juntos
</div>

</div>

<div class="foto">

<img src="foto6.jpg">

<div class="texto">
Y asi comienza mi nombre
</div>

</div>


<div class="foto">

<img src="foto7.jpg">

<div class="texto">
Mis abus
</div>

</div>

<div class="foto">

<img src="foto8.jpg">

<div class="texto">
Lupi, Popi y Lolita mis hermanitos peluds
</div>

</div>

<div class="volverGaleria">

Volver al inicio

</div>

</div>


<!-- visor de imágenes grandes -->

<div id="visorFotoGrande">

<img id="imagenGrande">

</div>

<!-- firma -->

<div id="firma">

<a href="https://wa.me/5493854118422">

Diseño digital Morgana Tecno

</a>

</div>

</div>

<audio id="audio">

<source src="Te esperaba.mp3" type="audio/mpeg">

</audio>
<script>

const imagen=document.getElementById("portada");

const galeria=document.getElementById("galeria");

const musica=document.getElementById("musica");

const audio=document.getElementById("audio");

const detener=document.getElementById("detener");


const visor=document.getElementById("visorGaleria");

const volver=document.querySelector(".volverGaleria");


const fotos=document.querySelectorAll(".foto img");

const visorFoto=document.getElementById("visorFotoGrande");

const imagenGrande=document.getElementById("imagenGrande");





function ubicarBotones(){


const rect=imagen.getBoundingClientRect();



/*
Medidas basadas en portada.png de 1024x1536
*/


const escalaX=rect.width/1024;

const escalaY=rect.height/1536;


const offsetX=rect.left;

const offsetY=rect.top;





/************* GALERIA *************/


galeria.style.left=(offsetX+330*escalaX)+"px";

galeria.style.top=(offsetY+745*escalaY)+"px";

galeria.style.width=(365*escalaX)+"px";

galeria.style.height=(95*escalaY)+"px";





/************* MUSICA *************/


musica.style.left=(offsetX+345*escalaX)+"px";

musica.style.top=(offsetY+865*escalaY)+"px";

musica.style.width=(335*escalaX)+"px";

musica.style.height=(90*escalaY)+"px";



}





window.addEventListener("resize",ubicarBotones);


imagen.onload=ubicarBotones;






/* MUSICA */


musica.onclick=function(){


audio.pause();


audio.currentTime=0;


audio.play();



detener.style.display="block";


}





detener.onclick=function(){


audio.pause();


audio.currentTime=0;


detener.style.display="none";


}








/* ABRIR GALERIA */


galeria.onclick=function(){


visor.style.display="block";


}




/* CERRAR GALERIA */


volver.onclick=function(){


visor.style.display="none";


}








/* FOTO AMPLIADA */


fotos.forEach(foto=>{


foto.onclick=function(){


imagenGrande.src=this.src;


visorFoto.classList.add("activo");


}



});






visorFoto.onclick=function(){


visorFoto.classList.remove("activo");


}




</script>

<script
    data-goatcounter="https://morgana.goatcounter.com/count"
    async
    src="https://gc.zgo.at/count.js">
</script>

</body>

</html>
